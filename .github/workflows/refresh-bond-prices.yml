# Scheduled military bond price refresh (feature 009). Runs the headless-browser scraper on GitHub's
# Ubuntu runners (NOT the 512 MB Fly backend, which would OOM Chromium; NOT an in-process job, since
# the backend scales to zero). Consumed on Linux runners, so this file is UTF-8/LF per CLAUDE.md.
name: refresh-bond-prices

on:
  schedule:
    # 07:00 UTC, Mon-Fri = 10:00 Kyiv in summer (EEST) / 09:00 in winter (EET). GitHub cron has no
    # time zone; the one-hour DST drift is accepted (see spec Assumptions). Cron is best-effort and
    # may be delayed; GitHub also disables schedules after ~60 days of repo inactivity.
    - cron: '0 7 * * 1-5'
  workflow_dispatch: {}   # manual trigger (off-schedule refresh)

# Avoid overlapping runs (a slow scrape + a manual kick).
concurrency:
  group: refresh-bond-prices
  cancel-in-progress: false

jobs:
  scrape:
    name: Scrape and ingest bond prices
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: scraper/package-lock.json

      - name: Install dependencies
        working-directory: scraper
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('scraper/package-lock.json') }}

      - name: Install Chromium (with OS deps)
        working-directory: scraper
        run: npx playwright install --with-deps chromium

      - name: Run scraper -> ingest
        working-directory: scraper
        env:
          BACKEND_BASE_URL: https://api.investguideua.com
          BOND_INGEST_SECRET: ${{ secrets.BOND_INGEST_SECRET }}
        run: npm run scrape
