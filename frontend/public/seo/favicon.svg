<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="InvestGuideUA">
  <title>InvestGuideUA</title>
  <!-- Ukrainian flag field: institutional blue over refined wheat-gold (brand tokens). -->
  <rect width="32" height="16" fill="#0057b7"/>
