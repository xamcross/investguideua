# InvestGuideUA — single-host local + MVP deployment (SPECIFICATION §1.1, §2, §11).
# No microservices, no message queues, no orchestration: just Mongo + backend + static SPA.
services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    build: ./backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Compose service DNS overrides the .env localhost default for in-network Mongo.
      MONGODB_URI: mongodb://mongo:27017/investguide
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health | grep -q UP"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8081:80"

volumes:
  mongo-data:
